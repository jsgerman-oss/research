bio: |
  Independent research on multi-agent LLM systems, model routing under
  cost-quality constraints, and agentic AI infrastructure.

  I work on the systems-and-statistics layer of multi-agent LLM workflows:
  how to route work across heterogeneous model tiers, how to bound quality
  loss when a cheaper model is substituted, and how to design dispatch
  policies that survive non-stationary production telemetry.

