role: Cloud Infrastructure Technical Lead

bio: |
  Cloud infrastructure technical lead with broad systems experience,
  currently driving Azure-based platform work at Armada across commercial
  and Azure Government environments, with active contributions to FinOps
  and governance, risk, and compliance (GRC).

  I believe building systems and software is an act of service: the people
  using what I ship deserve to enjoy it. That ethos shapes how I lead. I
  care about what reaches production, not just what ships.

  My work spans stakeholder engagement, product delivery, incident
  response, continuous delivery, and systems engineering, with deep
  experience in cloud cost control, security hardening, and digital
  transformation across Azure, AWS, and GCP. I've delivered cross-team
  initiatives at a sustainable pace, the kind that hold up after I move on.

  Mentoring is core to how I work. I coach engineers, mentor other mentors,
  and help teams grow into work they didn't think they could own yet.

  On the side, I do independent research on multi-agent LLM systems: model
  routing under cost-quality constraints, conservative Bayesian dispatch
  policies, and agentic AI infrastructure. Current work: CC-TS, a
  conservatively-biased Bayesian model-tier advisor with Beta-Bernoulli
  posteriors per agent, shape, and tier; conformal wrappers for quality
  bounds; uncertainty-triggered evaluation.

