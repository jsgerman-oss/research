name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily rebuild at 04:00 UTC — picks up paper edits, broken links, dependency drift.
    - cron: '0 4 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Hugo Blox kit modules require Hugo extended >= 0.161.0.
  # 'latest' resolves to the most recent published Hugo release.
  HUGO_VERSION: latest
  HUGO_ENVIRONMENT: production

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── 1. Compile every paper to PDF ───────────────────────────────────
      # Auto-discovery: any directory at the repo root matching `*-paper/`
      # that contains a `main.tex` is compiled. Each `main.pdf` is copied
      # into the matching `content/publications/<slug>/<slug>.pdf`, where
      # <slug> is the directory name minus the `-paper` suffix. Directories
      # without `main.tex` (e.g. paper sources still being assembled) are
      # skipped, not failed.
      #
      # We run inside the official `texlive/texlive:latest` Docker image
      # instead of apt-installing the same packages every run. The apt
      # path takes ~30 minutes (the texlive-* packages are ~3 GB across
      # thousands of files); the Docker pull is typically 30–90 s warm,
      # 1–2 min cold, and gives us a single known-good TeX Live version
      # rather than whatever Ubuntu happens to ship.
      - name: Pull TeX Live container
        run: docker pull texlive/texlive:latest

      - name: Compile all papers and stage PDFs
        # Per-paper failures are logged via ::warning:: and counted, but
        # do NOT fail the workflow — the site still deploys without that
        # paper's PDF. The verification step below decides whether the
        # workflow itself goes red.
        run: |
          set -uo pipefail
          shopt -s nullglob

          # Build the compile script inside the container. Mounted at
          # /work; runs as the host UID/GID so emitted files are owned
          # by the runner user, not root.
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            --user "$(id -u):$(id -g)" \
            texlive/texlive:latest \
            bash -c '
              set -uo pipefail
              shopt -s nullglob
              compiled=0
              skipped=0
              failed=0
              for paper_dir in *-paper/; do
                paper_dir="${paper_dir%/}"
                slug="${paper_dir%-paper}"
                if [ ! -f "$paper_dir/main.tex" ]; then
                  echo "::notice::Skipping $paper_dir — no main.tex"
                  skipped=$((skipped + 1))
                  continue
                fi
                echo "::group::Compiling $paper_dir → $slug.pdf"
                if (
                  cd "$paper_dir"
                  if [ -f Makefile ] && grep -q "^all:" Makefile; then
                    make
                  else
                    latexmk -pdf -bibtex -halt-on-error -interaction=nonstopmode main.tex
                  fi
                ); then
                  mkdir -p "content/publications/$slug"
                  cp "$paper_dir/main.pdf" "content/publications/$slug/$slug.pdf"
                  compiled=$((compiled + 1))
                else
                  echo "::warning::Paper $paper_dir failed to compile — site will deploy without its PDF"
                  failed=$((failed + 1))
                fi
                echo "::endgroup::"
              done
              echo "Compiled: $compiled  |  Skipped: $skipped  |  Failed: $failed"
            '

      - name: Verify staged PDFs and write step summary
        # Surfaces a per-paper pass/fail table in the Actions UI. Fails
        # the workflow if any paper that has source (main.tex present)
        # did NOT produce a staged PDF. Skeleton papers without main.tex
        # are reported but do not fail the build.
        run: |
          set -uo pipefail
          shopt -s nullglob
          {
            echo "## Paper compile results"
            echo
            echo "| Paper | main.tex | PDF | Size |"
            echo "|-------|----------|-----|------|"
          } >> "$GITHUB_STEP_SUMMARY"
          regressions=0
          for paper_dir in *-paper/; do
            paper_dir="${paper_dir%/}"
            slug="${paper_dir%-paper}"
            has_src="-"
            has_pdf="-"
            size="-"
            if [ -f "$paper_dir/main.tex" ]; then
              has_src="✓"
              pdf="content/publications/$slug/$slug.pdf"
              if [ -f "$pdf" ]; then
                has_pdf="✓"
                size=$(du -h "$pdf" | awk '{print $1}')
              else
                has_pdf="✗ MISSING"
                regressions=$((regressions + 1))
              fi
            fi
            echo "| $slug | $has_src | $has_pdf | $size |" >> "$GITHUB_STEP_SUMMARY"
          done
          if [ "$regressions" -gt 0 ]; then
            echo "::error::$regressions paper(s) with source failed to produce a PDF"
            exit 1
          fi
          echo "All papers with source compiled successfully."

      # ── 2. Build the Hugo site ───────────────────────────────────────────
      - name: Setup Go (for Hugo modules)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      # Hugo Blox v4 ships package.json declaring @tailwindcss/cli + tailwindcss
       # + pagefind via pnpm. Install via the kit's own toolchain so Hugo's
      # css.TailwindCSS function finds the right CLI on PATH.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: Install Node dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Add node_modules/.bin to PATH
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Hugo Blox dependencies
        run: |
          set -euo pipefail
          hugo mod get -u
          hugo mod tidy

      - name: Build site with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
